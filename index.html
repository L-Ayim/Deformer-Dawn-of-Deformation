<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Signature Terrain – Controls</title>

  <!-- nipple.js for on-screen joystick -->
  <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>

  <!-- pull in external CSS -->
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>

  <div id="info">
    <strong>Controls:</strong>
    <span id="controls-desktop">
      W/A/S/D → Move<br>
      Mouse → Look<br>
      Shift → Sprint<br>
      Space ↔ Fly Mode<br>
      Ctrl → Descend<br>
      LMB → Shoot / Recall<br>
      Esc → Reset
    </span>
    <span id="controls-mobile" style="display: none;">
      Joystick (left) → Move<br>
      Drag screen → Look<br>
      Red Button → Shoot / Recall<br>
      Tap top or ▲ ↔ Jump / Ascend<br>
      Tap bottom or ▼ ↔ Descend<br>
      Fly Btn ↔ Fly / Walk<br>
      ⛶ → Fullscreen
    </span>
  </div>

  <div id="leaderboard">
    <strong>Leaderboard</strong>
    <ol id="leaderboard-list"></ol>
  </div>

  <button id="fullscreen-btn">⛶</button>
  <div id="joystick-zone"></div>
  <div id="joystick-look-zone"></div>
  <div id="shoot-button"></div>
  <div id="fly-toggle-button" class="fly-control">Fly</div>

  <!-- Three.js & Noise libs are imported by js/main.js -->

  <!-- Mobile UI behavior (joystick, fullscreen hints, fly/jump) -->
  <script>
    const isMobile      = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const infoPanel     = document.getElementById('info');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    let idleTimeout;

    function resetIdleTimer() {
      infoPanel.classList.remove('visible');
      fullscreenBtn.classList.remove('visible');
      clearTimeout(idleTimeout);
      idleTimeout = setTimeout(() => {
        infoPanel.classList.add('visible');
        fullscreenBtn.classList.add('visible');
      }, 3000);
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (!isMobile) return;

      document.getElementById('controls-desktop').style.display   = 'none';
      document.getElementById('controls-mobile').style.display    = 'inline';
      document.getElementById('joystick-zone').style.display      = 'block';
      document.getElementById('shoot-button').style.display       = 'block';
      document.getElementById('fly-toggle-button').style.display  = 'block';
      fullscreenBtn.style.display                                 = 'block';

      fullscreenBtn.addEventListener('click', () => {
        const el = document.documentElement;
        if (!document.fullscreenElement) {
          el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
        } else {
          document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }
      });

      document.addEventListener('touchstart', resetIdleTimer, { passive: true });
      document.addEventListener('mousemove', resetIdleTimer, { passive: true });
      resetIdleTimer();
    });
  </script>

  <!-- Main game script -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
