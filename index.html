<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Deformer: Dawn of Deformation</title>

  <!-- nipple.js for on-screen joystick -->
  <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>

  <!-- pull in external CSS -->
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div id="start-screen">
    <h1>Deformer: Dawn of Deformation</h1>
    <p>
      Controls:<br>
      WASD - Move<br>
      Mouse - Look<br>
      Left Click - Shoot<br>
      Space - Jump/Fly<br>
      Shift - Sprint
    </p>
    <button id="start-button">Join Game</button>
  </div>
  <button id="fullscreen-btn">⛶</button>
  <div id="joystick-zone"></div>
  <div id="joystick-look-zone"></div>
  <div id="shoot-button"></div>
  <div id="sprint-button" class="fly-control">S</div>
  <div id="ascend-button" class="fly-control">&#9650;</div>
  <div id="descend-button" class="fly-control">&#9660;</div>

  <div id="health-bar">
    <div id="health-text"></div>
    <div id="health-fill"></div>
  </div>
  <div id="scoreboard"></div>
  <div id="labels"></div>

  <!-- Three.js & Noise libs are imported by js/main.js -->

  <!-- Mobile UI behavior (joystick and fullscreen) -->
  <script>
    const isMobile      = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const fullscreenBtn = document.getElementById('fullscreen-btn');

    window.addEventListener('DOMContentLoaded', () => {
      if (!isMobile) return;

      document.getElementById('joystick-zone').style.display = 'block';
      document.getElementById('shoot-button').style.display  = 'block';
      document.getElementById('sprint-button').style.display = 'block';
      document.getElementById('ascend-button').style.display = 'block';
      document.getElementById('descend-button').style.display = 'block';
      fullscreenBtn.style.display                             = 'block';

      fullscreenBtn.addEventListener('click', () => {
        const el = document.documentElement;
        if (!document.fullscreenElement) {
          el.requestFullscreen?.() || el.webkitRequestFullscreen?.();
        } else {
          document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }
      });
    });
  </script>

  <!-- Main game script -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
